<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Conecta Y Gana RD</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #e8eaed;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #5f6368;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .btn:hover {
            background: #1557b0;
        }
        .hidden {
            display: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #5f6368;
        }
        .error-msg {
            background: #fce8e6;
            color: #d93025;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #9aa0a6;
        }
        .footer a {
            color: #1a73e8;
            text-decoration: none;
        }
        input[type="text"], input[type="date"] {
            padding: 6px 10px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 13px;
        }
        .checkbox-large {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .status-pending { background: #fef7e0; color: #ea8600; }
        .status-completed { background: #e3f2fd; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Conecta Y Gana RD – Dashboard</h1>
        <div id="loading" class="loading">⏳ Cargando pagos pendientes...</div>
        <div id="error-area" class="hidden"></div>

        <div id="content" class="hidden">
            <h2 style="color: #202124; margin-bottom: 15px;">💰 Pagos Pendientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Banco</th>
                        <th>Cuenta</th>
                        <th>Monto</th>
                        <th>Comprobante</th>
                        <th>Fecha de Pago</th>
                        <th>Marcar Pagado</th>
                    </tr>
                </thead>
                <tbody id="payouts-table-body">
                    <tr><td colspan="8" style="text-align:center; color:#9aa0a6;">No hay pagos pendientes.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <a href="/">🏠 Inicio</a> |
            <a href="/admin">🛠️ Admin</a> |
            <a href="/terms">📜 Términos</a>
        </div>
    </div>

    <script>
        // ============================================
        // DASHBOARD – v4.0 – 2026-07-21
        // ============================================
        const API_BASE = '';

        const loading = document.getElementById('loading');
        const content = document.getElementById('content');
        const errorArea = document.getElementById('error-area');
        const payoutsTbody = document.getElementById('payouts-table-body');

        function showError(msg) {
            errorArea.classList.remove('hidden');
            errorArea.innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
            loading.classList.add('hidden');
        }

        function hideError() {
            errorArea.classList.add('hidden');
            errorArea.innerHTML = '';
        }

        function statusBadge(status) {
            const map = {
                'pending': 'status-pending',
                'completed': 'status-completed'
            };
            return `<span class="status-badge ${map[status] || ''}">${status.toUpperCase()}</span>`;
        }

        async function fetchPendingPayouts() {
            try {
                hideError();
                loading.classList.remove('hidden');
                content.classList.add('hidden');

                const res = await fetch(`${API_BASE}/api/admin/pending-payouts`);
                if (!res.ok) throw new Error('Error al obtener pagos pendientes');
                const data = await res.json();

                renderPayouts(data.payouts);
                loading.classList.add('hidden');
                content.classList.remove('hidden');
            } catch (err) {
                showError('Error: ' + err.message);
                loading.classList.add('hidden');
            }
        }

        function renderPayouts(payouts) {
            if (!payouts || payouts.length === 0) {
                payoutsTbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#9aa0a6;">No hay pagos pendientes.</td></tr>';
                return;
            }

            let html = '';
            payouts.forEach(p => {
                const bank = p.bankingDetails?.bankName || 'N/A';
                const account = p.bankingDetails?.accountNumber || 'N/A';
                html += `<tr id="payout-row-${p.id}">
                    <td>${p.refereeName}</td>
                    <td>${p.refereePhone}</td>
                    <td>${bank}</td>
                    <td>${account}</td>
                    <td>RD$ ${p.amount.toLocaleString()}</td>
                    <td><input type="text" id="txn-${p.id}" placeholder="N° Transacción"></td>
                    <td><input type="date" id="date-${p.id}" value="${new Date().toISOString().split('T')[0]}"></td>
                    <td>
                        <input type="checkbox" class="checkbox-large" id="check-${p.id}" onchange="completePayout('${p.id}')">
                    </td>
                </tr>`;
            });
            payoutsTbody.innerHTML = html;
        }

        async function completePayout(payoutId) {
            const checkbox = document.getElementById(`check-${payoutId}`);
            if (!checkbox.checked) return;

            if (!confirm(`¿Marcar este pago como completado?`)) {
                checkbox.checked = false;
                return;
            }

            const txnInput = document.getElementById(`txn-${payoutId}`);
            const dateInput = document.getElementById(`date-${payoutId}`);
            const transactionNumber = txnInput.value.trim();
            const transactionDate = dateInput.value;

            if (!transactionNumber) {
                alert('Por favor, ingresa el número de transacción.');
                checkbox.checked = false;
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/admin/complete-payout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        payoutId,
                        transactionNumber,
                        transactionDate
                    })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    alert('✅ Pago completado exitosamente');
                    fetchPendingPayouts(); // refresh the list
                } else {
                    alert('❌ Error: ' + (data.error || 'No se pudo completar el pago'));
                    checkbox.checked = false;
                }
            } catch (err) {
                alert('❌ Error de conexión: ' + err.message);
                checkbox.checked = false;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchPendingPayouts);
    </script>
</body>
</html>
