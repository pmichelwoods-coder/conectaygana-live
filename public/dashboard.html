<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Conecta Y Gana RD</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e8eaed;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #1a73e8;
        }
        .stat-card .label {
            font-size: 14px;
            color: #5f6368;
            margin-top: 5px;
        }
        .section {
            margin-top: 25px;
            border-top: 1px solid #e8eaed;
            padding-top: 20px;
        }
        .referral-link-box {
            background: #f8f9fa;
            border: 1px dashed #dadce0;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .referral-link-box input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn:hover {
            background: #1557b0;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #9aa0a6;
        }
        .footer a {
            color: #1a73e8;
            text-decoration: none;
        }
        .hidden {
            display: none;
        }
        .error-msg {
            background: #fce8e6;
            color: #d93025;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #5f6368;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Conecta Y Gana RD</h1>
        <div id="loading" class="loading">⏳ Cargando tu información...</div>
        <div id="error-area" class="hidden"></div>

        <div id="content" class="hidden">
            <p id="user-name" style="font-size: 16px; color: #202124;">👋 Bienvenido, <strong>Cargando...</strong></p>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number" id="stat-clients">0</div>
                    <div class="label">Total Clientes</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-paid">RD$0</div>
                    <div class="label">Total Pagado</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-pending">RD$0</div>
                    <div class="label">Pago Pendiente</div>
                </div>
            </div>

            <div class="section">
                <h3>🔗 Tu enlace de referido</h3>
                <div class="referral-link-box">
                    <input type="text" id="referral-link" readonly>
                    <button class="btn" onclick="copyLink()">📋 Copiar</button>
                </div>
            </div>

            <div class="section" id="payout-section" style="display: none;">
                <h3>💰 Tienes un pago pendiente</h3>
                <p style="color: #1e8e3e; font-size: 18px; font-weight: 700;" id="pending-amount">RD$0</p>
                <p style="color: #5f6368;">Cuando el administrador lo procese, aparecerá en "Total Pagado".</p>
            </div>
        </div>

        <div class="footer">
            <a href="/">🏠 Inicio</a> |
            <a href="/admin">🛠️ Admin</a> |
            <a href="/terms">📜 Términos</a>
        </div>
    </div>

    <script>
        // ============================================
        // DASHBOARD – v3.0 – 2026-07-21
        // ============================================
        const API_BASE = '';
        const PHONE_KEY = 'dashboard_phone';

        const loading = document.getElementById('loading');
        const content = document.getElementById('content');
        const errorArea = document.getElementById('error-area');

        function getPhone() { return localStorage.getItem(PHONE_KEY) || ''; }
        function savePhone(p) { localStorage.setItem(PHONE_KEY, p); }

        function showError(msg) {
            errorArea.classList.remove('hidden');
            errorArea.innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
            loading.classList.add('hidden');
        }

        function hideError() {
            errorArea.classList.add('hidden');
            errorArea.innerHTML = '';
        }

        async function loadDashboard(phone) {
            try {
                hideError();
                loading.classList.remove('hidden');
                content.classList.add('hidden');

                // Fetch user
                const userRes = await fetch(`${API_BASE}/api/user/${phone}`);
                if (!userRes.ok) {
                    if (userRes.status === 404) {
                        alert('Usuario no encontrado. Registrate primero.');
                        window.location.href = '/';
                        return;
                    }
                    throw new Error(`HTTP ${userRes.status}`);
                }
                const user = await userRes.json();

                // Fetch payouts
                const payRes = await fetch(`${API_BASE}/api/user/${phone}/payouts`);
                const payouts = payRes.ok ? await payRes.json() : { payouts: [] };

                // Render
                renderDashboard(user, payouts);
                loading.classList.add('hidden');
                content.classList.remove('hidden');
            } catch (err) {
                showError('Error: ' + err.message);
                loading.classList.add('hidden');
            }
        }

        function renderDashboard(user, payouts) {
            // User name
            document.getElementById('user-name').innerHTML = `👋 Bienvenido, <strong>${user.name || 'Usuario'}</strong>`;

            // Stats
            const totalClients = user.totalCustomers || 0;
            const totalPaid = user.totalPaid || 0;
            // Calculate pending = sum of payouts with status 'pending'
            const pendingAmount = (payouts.payouts || [])
                .filter(p => p.status === 'pending')
                .reduce((sum, p) => sum + (p.amount || 0), 0);

            document.getElementById('stat-clients').textContent = totalClients;
            document.getElementById('stat-paid').textContent = `RD$${totalPaid.toLocaleString()}`;
            document.getElementById('stat-pending').textContent = `RD$${pendingAmount.toLocaleString()}`;

            // Referral link
            const baseUrl = window.location.origin;
            const code = user.referralCode || '';
            document.getElementById('referral-link').value = code ? `${baseUrl}/?ref=${code}` : '⚠️ Sin código aún';

            // Show pending payout section if any
            const section = document.getElementById('payout-section');
            if (pendingAmount > 0) {
                section.style.display = 'block';
                document.getElementById('pending-amount').textContent = `RD$${pendingAmount.toLocaleString()}`;
            } else {
                section.style.display = 'none';
            }

            savePhone(user.phone);
        }

        function copyLink() {
            const input = document.getElementById('referral-link');
            if (!input.value || input.value.includes('⚠️')) {
                alert('No hay enlace para copiar aún.');
                return;
            }
            navigator.clipboard.writeText(input.value)
                .then(() => alert('✅ Enlace copiado!'))
                .catch(() => {
                    input.select();
                    document.execCommand('copy');
                    alert('✅ Enlace copiado!');
                });
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            let phone = params.get('phone') || getPhone();

            if (!phone) {
                const userPhone = prompt('📱 Ingresa tu número de teléfono (ej: 8498634889):');
                if (userPhone) {
                    phone = userPhone.replace(/\D/g, '');
                    savePhone(phone);
                } else {
                    window.location.href = '/';
                    return;
                }
            }

            if (phone) {
                loadDashboard(phone);
            } else {
                showError('No se pudo obtener tu número.');
            }
        });
    </script>
</body>
</html>
